name: Build Flatpak

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-flatpak:
    runs-on: ubuntu-latest
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-47
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build puller sidecar
        run: |
          corepack enable
          corepack prepare pnpm@10 --activate
          pnpm install --frozen-lockfile
          cd puller && npx playwright install-deps chromium
          cd ..
          pnpm puller:bundle:linux

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: flatpak/com.potatotomato.games.yml
          bundle: potato-tomato.flatpak
          cache-key: flatpak-builder-${{ github.sha }}
          branch: stable

      - name: Upload Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: potato-tomato-flatpak
          path: potato-tomato.flatpak
          if-no-files-found: error
