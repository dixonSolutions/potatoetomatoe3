name: Build Flatpak

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-sidecar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Build puller sidecar
        run: |
          pnpm install --frozen-lockfile
          cd puller && npx playwright install-deps chromium
          cd ..
          pnpm puller:bundle:linux

      - uses: actions/upload-artifact@v4
        with:
          name: puller-sidecar
          path: src-tauri/binaries/
          if-no-files-found: error

  build-flatpak:
    runs-on: ubuntu-latest
    needs: build-sidecar
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-47
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/download-artifact@v4
        with:
          name: puller-sidecar
          path: src-tauri/binaries

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: flatpak/com.potatotomato.games.yml
          bundle: potato-tomato.flatpak
          cache-key: flatpak-builder-${{ github.sha }}
          branch: stable

      - name: Upload Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: potato-tomato-flatpak
          path: potato-tomato.flatpak
          if-no-files-found: error
