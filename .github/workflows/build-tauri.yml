name: Build Flatpak

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-flatpak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Flatpak
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak --user install -y flathub org.gnome.Platform//50 org.gnome.Sdk//50

      - name: Install Tauri build dependencies
        run: |
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf \
            pkg-config libssl-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Build app binaries
        run: |
          pnpm install --frozen-lockfile
          cd puller && npx playwright install-deps chromium
          cd ..
          pnpm puller:bundle:linux
          pnpm tauri:build:flatpak
          test -x src-tauri/target/release/potato-tomato

      - name: Build Flatpak
        run: |
          flatpak-builder --force-clean --user --install-deps-from=flathub \
            --repo=repo --default-branch=stable \
            build-flatpak flatpak/com.potatotomato.games.yml
          flatpak build-bundle repo potato-tomato.flatpak com.potatotomato.games --branch=stable

      - uses: actions/upload-artifact@v4
        with:
          name: potato-tomato-flatpak
          path: potato-tomato.flatpak
          if-no-files-found: error
