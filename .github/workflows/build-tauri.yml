name: Build Flatpak

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Tauri build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf \
            pkg-config libssl-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Build app binaries
        run: |
          pnpm install --frozen-lockfile
          cd puller && npx playwright install-deps chromium
          cd ..
          pnpm puller:bundle:linux
          pnpm tauri:build:flatpak

      - uses: actions/upload-artifact@v4
        with:
          name: app-binaries
          path: |
            src-tauri/target/release/potato-tomato
            src-tauri/binaries/
          if-no-files-found: error

  build-flatpak:
    runs-on: ubuntu-latest
    needs: build-app
    container:
      image: bilelmoussaoui/flatpak-github-actions:gnome-47
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/download-artifact@v4
        with:
          name: app-binaries
          path: .

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: flatpak/com.potatotomato.games.yml
          bundle: potato-tomato.flatpak
          cache-key: flatpak-builder-${{ github.sha }}
          branch: stable

      - name: Upload Flatpak
        uses: actions/upload-artifact@v4
        with:
          name: potato-tomato-flatpak
          path: potato-tomato.flatpak
          if-no-files-found: error
