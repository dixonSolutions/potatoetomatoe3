name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: ver
        run: echo "version=0.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

  build-flatpak:
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Flatpak
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak --user remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak --user install -y flathub \
            org.gnome.Platform//50 \
            org.gnome.Sdk//50 \
            org.freedesktop.Sdk.Extension.node22//25.08 \
            org.freedesktop.Sdk.Extension.rust-stable//25.08

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump version
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          node -e "
            const fs = require('fs');
            for (const f of ['package.json', 'src-tauri/tauri.conf.json']) {
              const j = JSON.parse(fs.readFileSync(f, 'utf8'));
              j.version = '$VERSION';
              fs.writeFileSync(f, JSON.stringify(j, null, 2) + '\n');
            }
            let cargo = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
            cargo = cargo.replace(/^version = \".*\"/m, 'version = \"$VERSION\"');
            fs.writeFileSync('src-tauri/Cargo.toml', cargo);
            fs.writeFileSync('version.txt', '$VERSION\n');
          "

      - name: Build puller sidecar
        run: |
          cd puller && npx playwright install-deps chromium
          cd ..
          pnpm puller:bundle:linux

      - name: Build Flatpak
        run: |
          flatpak-builder --force-clean --user --repo=repo --default-branch=stable \
            build-flatpak flatpak/com.potatotomato.games.yml
          flatpak build-update-repo repo --generate-static-deltas
          flatpak build-bundle repo "com.potatotomato.games-${{ needs.version.outputs.version }}.flatpak" \
            com.potatotomato.games --branch=stable

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-bundle
          path: |
            com.potatotomato.games-*.flatpak
            repo/
          if-no-files-found: error

  deploy-pages:
    runs-on: ubuntu-latest
    needs: [build-flatpak, version]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/download-artifact@v4
        with:
          name: flatpak-bundle
          path: flatpak-artifacts

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build site for GitHub Pages
        run: pnpm build
        env:
          NODE_ENV: production
          PUBLIC_PAGES_BASE: /potatoetomatoe3
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Attach Flatpak OSTree repo
        run: |
          mkdir -p build/flatpak
          cp -a flatpak-artifacts/repo/. build/flatpak/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

      - uses: actions/deploy-pages@v4
        id: deployment

  publish-release:
    runs-on: ubuntu-latest
    needs: [build-flatpak, version]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: flatpak-bundle
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ github.run_number }}
          name: Release ${{ needs.version.outputs.version }}
          generate_release_notes: true
          make_latest: true
          files: dist/com.potatotomato.games-*.flatpak
