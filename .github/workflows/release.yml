name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: ver
        run: echo "version=0.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

  build-flatpak:
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install Flatpak
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install -y flathub org.gnome.Platform//47 org.gnome.Sdk//47 \
            org.gnome.Sdk.Extension.node20//24.08 \
            org.gnome.Sdk.Extension.rust-stable//24.08

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bump version
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          node -e "
            const fs = require('fs');
            for (const f of ['package.json', 'src-tauri/tauri.conf.json']) {
              const j = JSON.parse(fs.readFileSync(f, 'utf8'));
              j.version = '$VERSION';
              fs.writeFileSync(f, JSON.stringify(j, null, 2) + '\n');
            }
            let cargo = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
            cargo = cargo.replace(/^version = \".*\"/m, 'version = \"$VERSION\"');
            fs.writeFileSync('src-tauri/Cargo.toml', cargo);
            fs.writeFileSync('version.txt', '$VERSION\n');
          "

      - name: Build puller sidecar
        run: pnpm puller:bundle:linux
        continue-on-error: true

      - name: Build Flatpak
        run: |
          flatpak-builder --force-clean --repo=repo build-flatpak flatpak/com.potatotomato.games.yml
          flatpak build-bundle repo com.potatotomato.games-${{ needs.version.outputs.version }}.flatpak \
            com.potatotomato.games

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-bundle
          path: |
            com.potatotomato.games-*.flatpak
            repo/
          if-no-files-found: warn

  publish-release:
    runs-on: ubuntu-latest
    needs: [build-flatpak, version]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: flatpak-bundle
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ github.run_number }}
          name: Release ${{ needs.version.outputs.version }}
          generate_release_notes: true
          make_latest: true
          files: dist/com.potatotomato.games-*.flatpak
