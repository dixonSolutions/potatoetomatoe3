app-id: com.potatotomato.games
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node22//50
  - org.freedesktop.Sdk.Extension.rust-stable//50
command: potato-tomato
build-options:
  build-args:
    - --share=network
finish-args:
  - --share=network
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
  - --talk-name=org.freedesktop.Notifications

modules:
  - name: potato-tomato
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/node22/bin:/usr/lib/sdk/rust-stable/bin
      build-args:
        - --share=network
      env:
        CARGO_HOME: /run/build/potato-tomato/cargo
        npm_config_nodedir: /usr/lib/sdk/node22
        NODE_ENV: production
        CI: "true"
    build-commands:
      - npm install -g pnpm --prefix /run/build/potato-tomato/npm-global
      - export PATH="/run/build/potato-tomato/npm-global/bin:$PATH" && pnpm install --frozen-lockfile
      - export PATH="/run/build/potato-tomato/npm-global/bin:$PATH" && pnpm tauri:build
      - install -Dm755 src-tauri/target/release/potato-tomato /app/bin/potato-tomato
      - |
        SIDECAR=""
        for candidate in \
          src-tauri/binaries/puller-sidecar-x86_64-unknown-linux-gnu \
          src-tauri/binaries/puller-sidecar; do
          if [ -f "$candidate" ]; then SIDECAR="$candidate"; break; fi
        done
        if [ -z "$SIDECAR" ]; then echo "ERROR puller sidecar missing — run pnpm puller:bundle:linux" >&2; exit 1; fi
        install -Dm755 "$SIDECAR" /app/bin/puller-sidecar
      - install -Dm644 flatpak/com.potatotomato.games.desktop /app/share/applications/com.potatotomato.games.desktop
      - install -Dm644 buildResources/icons/potato-tomato-512.png /app/share/icons/hicolor/512x512/apps/com.potatotomato.games.png
    sources:
      - type: dir
        path: ..
